<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI百盒旅行机 手机适配终版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
.wrap{max-width:750px;margin:0 auto}
h1{color:#fff;text-align:center;margin-bottom:18px;font-size:26px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.row{display:flex;gap:10px;margin-bottom:12px}
.row>div{flex:1}
label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px;color:#334155}
input,select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{padding:6px 12px;border:2px solid #e2e8f0;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;user-select:none;transition:.2s}
.tag.on{background:#667eea;color:#fff;border-color:#667eea}
.days{display:flex;gap:8px;margin-top:6px;justify-content:center;flex-wrap:wrap}
.day{padding:8px 18px;border:2px solid #e2e8f0;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;min-width:110px}
.day.on{background:#667eea;color:#fff;border-color:#667eea}
.btn{display:block;width:100%;max-width:260px;margin:18px auto 0;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:999px;font-size:15px;font-weight:bold;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,.4)}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.anim{text-align:center;padding:50px 20px;min-height:280px;display:none;flex-direction:column;align-items:center;justify-content:center}
.box{width:130px;height:130px;margin:0 auto 20px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:14px;position:relative;animation:float 2.5s ease-in-out infinite}
.box::before{content:'';position:absolute;top:-12px;left:-3px;right:-3px;height:26px;background:linear-gradient(180deg,#f97316,#ea580c);border-radius:8px 8px 0 0}
.box::after{content:'🎁';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:45px}
.box.shake{animation:shake .25s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
.result{display:none}
.result.show{display:block;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.dest-name{text-align:center;font-size:30px;font-weight:bold;color:#667eea;margin-bottom:6px}
.dest-slogan{text-align:center;color:#64748b;margin-bottom:12px;font-size:14px}
.dest-tags{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.dest-tag{background:#eef2ff;color:#667eea;padding:3px 10px;border-radius:15px;font-size:12px}
.overview{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.ov-item{background:#eef2ff;padding:12px 8px;border-radius:10px;text-align:center}
.ov-item .n{font-size:18px;font-weight:bold;color:#667eea}
.ov-item .l{font-size:11px;color:#64748b;margin-top:3px}
.map{height:260px;background:#f8fafc;border-radius:10px;position:relative;overflow:hidden;margin-top:10px;border:1px solid #e2e8f0}
.map-bg{position:absolute;inset:0;background:linear-gradient(90deg,#e2e8f0 1px,transparent 1px),linear-gradient(#e2e8f0 1px,transparent 1px);background-size:25px 25px}
.point{position:absolute;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);transform:translate(-50%,-50%);z-index:10}
.point.s{background:#10b981}
.point.e{background:#ef4444}
.point.n{background:#3b82f6}
.point .lb{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:2px 6px;border-radius:3px;font-size:11px;white-space:nowrap;opacity:0;transition:.2s}
.point:hover .lb{opacity:1}
.point .seq{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:10px;font-weight:900;color:#fff;
  pointer-events:none;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.day-card{border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:10px}
.day-title{font-weight:bold;color:#667eea;margin-bottom:8px;font-size:14px}
.tl{position:relative;padding-left:20px;margin-bottom:8px}
.tl::before{content:'';position:absolute;left:3px;top:5px;width:6px;height:6px;border-radius:50%;background:#667eea}
.tl::after{content:'';position:absolute;left:5px;top:13px;width:1.5px;height:calc(100% - 6px);background:#e2e8f0}
.tl:last-child::after{display:none}
.tl .t{font-weight:500;font-size:13px}
.tl .d{font-size:12px;color:#64748b;margin-top:2px}
.hotel{border-left:3px solid #667eea;background:#eef2ff;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:6px}
.hotel .n{font-weight:500;font-size:13px}
.hotel .i{font-size:12px;color:#64748b;margin-top:2px}
.hotel .p{float:right;color:#667eea;font-weight:bold;font-size:13px}
.btn-group{display:flex;justify-content:center;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn2{padding:9px 22px;border-radius:999px;cursor:pointer;font-size:13px;border:1px solid #e2e8f0;background:#fff}
.btn2.p{background:#667eea;color:#fff;border-color:#667eea}
.cost-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #e2e8f0;font-size:13px}
.cost-total{display:flex;justify-content:space-between;padding:10px 0 0;font-weight:bold;font-size:15px}
.cost-total .p{color:#667eea}
.sec-title{font-size:16px;font-weight:bold;margin-bottom:10px;color:#1e293b}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.col{background:#eef2ff;padding:10px;border-radius:10px}
.col h4{font-size:13px;margin-bottom:6px}
.col ul{font-size:12px;color:#64748b;list-style:none}
.col li{margin-bottom:3px;padding-left:10px;position:relative}
.col li::before{content:'•';position:absolute;left:0;color:#667eea}
.metro{font-size:13px;line-height:1.8;color:#475569}

/* ===== 移动端专项修复 ===== */
/* iOS Safari：表单元素16px防自动放大 */
@media screen and (-webkit-min-device-pixel-ratio:0) {
  select, input[type="text"] { font-size: 16px; }
}

@media(max-width:600px){
  .row{flex-direction:column}
  .overview{grid-template-columns:repeat(2,1fr)}
  .three-col{grid-template-columns:1fr}
  /* 卡片内边距收窄，适配小屏宽度 */
  .card{padding:14px 12px}
  /* 地图高度压缩 */
  .map{height:200px}
  /* 天数按钮缩小适配 */
  .day{min-width:90px;padding:8px 10px;font-size:12px}
  /* 标签加高居中，触控更跟手 */
  .tag{padding:5px 10px;font-size:12px;min-height:32px;
       display:flex;align-items:center;justify-content:center}
  /* 地图点位触控靶扩大至28px，接近44px下限 */
  .point{width:28px;height:28px}
  .point .seq{font-size:11px}
}
</style>
</head>
<body>
<div class="wrap">
<h1>🎁 盲盒旅行机</h1>

<div id="inputSec" class="card">
  <div class="row">
    <div><label>出发城市</label><input type="text" id="depCity" placeholder="例如：南通" value="南通"></div>
    <div><label>人均预算档位</label>
      <select id="budget">
        <option value="1500">💰 经济穷游（1500元内）</option>
        <option value="3000" selected>🎒 舒适出行（3000元档）</option>
        <option value="5000">🏨 品质享受（5000元档）</option>
        <option value="10000">💎 奢华度假（万元以上）</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div><label>旅行天数</label>
      <div class="days" id="dayBox">
        <div class="day" onclick="setDay(this,3)">3天短途</div>
        <div class="day on" onclick="setDay(this,5)">5天常规</div>
        <div class="day" onclick="setDay(this,7)">7天长线</div>
        <div class="day" onclick="setDay(this,10)">10天+深度游</div>
      </div>
    </div>
    <div><label>出行人群</label>
      <select id="travelers">
        <option value="solo" data-num="1" data-name="单人">🚶 独自单人出行</option>
        <option value="couple" data-num="2" data-name="双人" selected>💑 情侣双人</option>
        <option value="family" data-num="3.5" data-name="家庭(3-4人)">👨‍👩‍👧 亲子家庭（带娃）</option>
        <option value="friends" data-num="4" data-name="多人结伴(4人)">👯 朋友多人结伴</option>
        <option value="elders" data-num="2" data-name="长辈2人团">👴 长辈老年团</option>
      </select>
    </div>
  </div>
  <div>
    <label>旅行偏好（可多选/取消）</label>
    <div class="tags" id="tagBox">
      <div class="tag on" onclick="toggleTag(this)">🏔️ 自然风光</div>
      <div class="tag on" onclick="toggleTag(this)">🍜 美食探店</div>
      <div class="tag on" onclick="toggleTag(this)">🏛️ 历史文化</div>
      <div class="tag" onclick="toggleTag(this)">🌆 都市休闲</div>
      <div class="tag" onclick="toggleTag(this)">🏖️ 海岛度假</div>
      <div class="tag" onclick="toggleTag(this)">🥾 户外探险</div>
      <div class="tag" onclick="toggleTag(this)">🎨 文艺打卡</div>
      <div class="tag" onclick="toggleTag(this)">🎡 亲子游乐</div>
      <div class="tag" onclick="toggleTag(this)">🏮 古镇慢游</div>
    </div>
  </div>
  <button class="btn" onclick="startGame()">🎁 开启旅行盲盒</button>
</div>

<div id="animSec" class="card anim">
  <div class="box" id="box"></div>
  <p id="animText">正在匹配你的出行需求…</p>
</div>

<div id="resultSec" class="result">
  <div class="card">
    <div class="dest-name" id="rName"></div>
    <div class="dest-slogan" id="rSlogan"></div>
    <div class="dest-tags" id="rTags"></div>
  </div>
  <div class="card">
    <div class="sec-title">📋 行程概览</div>
    <div class="overview" id="rOv"></div>
  </div>
  <div class="card">
    <div class="sec-title">🗺️ 城市游览路线</div>
    <p style="font-size:12px;color:#64748b;margin-bottom:6px">🟢起点 🔴终点 🔵①②③④游览顺序（点击查看详情）</p>
    <div class="map" id="rMap"><div class="map-bg"></div></div>
  </div>
  <div class="card">
    <div class="sec-title">🗓️ 每日详细行程</div>
    <div id="rIti"></div>
  </div>
  <div class="card">
    <div class="sec-title">🏨 核心区连锁酒店比价</div>
    <div id="rHotel"></div>
  </div>
  <div class="card">
    <div class="sec-title">🚇 交通指南</div>
    <div class="metro" id="rMetro"></div>
  </div>
  <div class="card">
    <div class="sec-title">📝 出行指南</div>
    <div class="three-col" id="rGuide"></div>
  </div>
  <div class="card">
    <div class="sec-title">💰 费用明细估算</div>
    <div id="rCost"></div>
  </div>
  <div class="btn-group">
    <button class="btn2" onclick="retry()">🎲 再开一个</button>
    <button class="btn2" onclick="window.print()">📄 导出PDF</button>
    <button class="btn2 p" onclick="savePlan()">💾 保存方案</button>
  </div>
</div>

</div>

// ===== 全局变量 =====
var dayNum = 5;
var isRunning = false;

// ===== 天数选择 =====
function setDay(el, num) {
  document.querySelectorAll('.day').forEach(d => d.classList.remove('on'));
  el.classList.add('on');
  dayNum = num;
}

// ===== 标签切换 =====
function toggleTag(el) {
  el.classList.toggle('on');
}

// ===== 随机选城市算法 =====
function randomPick() {
  var budgetVal = Number(document.getElementById('budget').value);
  var tv = document.getElementById('travelers');
  var tOpt = tv.options[tv.selectedIndex];
  var pNum = Number(tOpt.dataset.num) || 1;
  var peopleType = tv.value;
  var peopleLabel = tOpt.dataset.name || "";
  var depCity = document.getElementById('depCity').value.trim() || "南通";

  var selTags = [];
  document.querySelectorAll('#tagBox .tag.on').forEach(t => {
    selTags.push(t.innerText.replace(/^./, '').trim());
  });

  var bestCity = null;
  var bestScore = -999;

  cities.forEach(function(city) {
    var score = 0;
    var totalBudget = budgetVal * pNum;
    var cityTotal = city.budgetLevel * 1500 * pNum;
    var tol = pNum <= 2 ? 1200 * pNum : 800 * pNum + 800;
    if (Math.abs(cityTotal - totalBudget) < tol) score += 0.22;

    var matchCount = 0;
    city.matchTags.forEach(function(tag) {
      if (selTags.includes(tag)) matchCount++;
    });
    score += matchCount * 0.15;

    var mt = city.matchTags;
    if (peopleType === 'family') {
      if (mt.includes('亲子游乐')) score += 0.12;
      if (mt.includes('美食探店')) score += 0.06;
    }
    if (peopleType === 'elders') {
      if (mt.includes('历史文化')) score += 0.10;
      if (mt.includes('自然风光')) score += 0.06;
    }
    if (peopleType === 'friends') {
      if (mt.includes('海岛度假')) score += 0.10;
      if (mt.includes('户外探险')) score += 0.08;
    }
    if (peopleType === 'solo') {
      if (mt.includes('文艺打卡')) score += 0.08;
      if (mt.includes('历史文化')) score += 0.06;
    }

    score += Math.random() * 0.15;
    if (score > bestScore) {
      bestScore = score;
      bestCity = city;
    }
  });

  return { city: bestCity, pNum: pNum, peopleLabel: peopleLabel, depCity: depCity, peopleType: peopleType };
}

// ===== 渲染结果 =====
function renderData(data) {
  var city = data.city;
  var pNum = data.pNum;
  var peopleLabel = data.peopleLabel;
  var depCity = data.depCity;
  var dayRate = dayNum / 5;

  document.getElementById('rName').innerText = city.name;
  document.getElementById('rSlogan').innerText = city.slogan;

  var tagsHtml = "";
  city.tags.forEach(t => tagsHtml += '<span class="dest-tag">'+ t +'</span>');
  document.getElementById('rTags').innerHTML = tagsHtml;

  var baseTotal = 0;
  city.costs.forEach(function(item) {
    var arr = item.a.split("-").map(Number);
    var arrMin = arr[0] || 0;
    var arrMax = arr[1] ?? arrMin;
    baseTotal += (arrMin + arrMax) / 2;
  });
  var perEst = Math.round(baseTotal * dayRate);
  var allEst = Math.round(perEst * pNum);

  var ovHtml = `
    <div class="ov-item"><div class="n">${dayNum}天${dayNum-1}晚</div><div class="l">旅行天数</div></div>
    <div class="ov-item"><div class="n">${peopleLabel}</div><div class="l">出行人群</div></div>
    <div class="ov-item">
      <div class="n">¥${perEst} × ${pNum}</div>
      <div class="l">人均估算 × 人数</div>
      <div style="font-size:12px;color:#64748b;margin-top:2px">合计约 ¥${allEst}</div>
    </div>
    <div class="ov-item"><div class="n">${depCity}出发</div><div class="l">出发城市</div></div>
  `;
  document.getElementById('rOv').innerHTML = ovHtml;

  var mapHtml = '<div class="map-bg"></div>';
  city.spots.forEach(function(s) {
    var showSeq = (s.type === 'n' && s.order && s.order <= dayNum) ? s.order : '';
    mapHtml += `
      <div class="point ${s.type}" style="left:${s.x}%;top:${s.y}%">
        ${showSeq ? '<span class="seq">'+ showSeq +'</span>' : ''}
        <div class="lb">${s.name}<br>${s.metro}</div>
      </div>
    `;
  });
  document.getElementById('rMap').innerHTML = mapHtml;

  // 行程：不足dayNum天自动补自由延展日
  var showDays = city.itinerary.slice(0, dayNum);
  while (showDays.length < dayNum) {
    var d = showDays.length + 1;
    showDays.push({ 
      t: `第${d}天 · 自由延展`, 
      acts: [{ ti: "全天", s: "可根据体力安排周边或休整", d: "参考"+city.name+"本地玩法自行探索" }] 
    });
  }

  var itiHtml = "";
  showDays.forEach(function(day, idx) {
    var actsHtml = "";
    day.acts.forEach(function(a) {
      actsHtml += `<div class="tl"><div class="t">${a.ti} · ${a.s}</div><div class="d">${a.d}</div></div>`;
    });
    itiHtml += `
      <div class="day-card">
        <div class="day-title">第${idx+1}天 · ${day.t}</div>
        ${actsHtml}
      </div>
    `;
  });
  document.getElementById('rIti').innerHTML = itiHtml;

  var hotelHtml = "";
  city.hotels.forEach(function(h) {
    var listHtml = "";
    h.list.forEach(function(l) {
      listHtml += `
        <div class="hotel">
          <span class="p">${l.p}</span>
          <div class="n">${l.n} <span style="color:#64748b;font-size:12px">${l.b} · ${l.l}</span></div>
        </div>
      `;
    });
    hotelHtml += `<div style="margin-bottom:8px;font-weight:bold;font-size:13px">📍 ${h.area}</div>${listHtml}`;
  });
  document.getElementById('rHotel').innerHTML = hotelHtml;

  var metroHtml = "";
  city.metro.forEach(m => metroHtml += m +"<br>");
  document.getElementById('rMetro').innerHTML = metroHtml;

  var guideHtml = `
    <div class="col">
      <h4>🎒 必备物品</h4>
      <ul>${city.pack.map(p => '<li>'+ p +'</li>').join('')}</ul>
    </div>
    <div class="col">
      <h4>💡 实用贴士</h4>
      <ul>${city.tips.map(p => '<li>'+ p +'</li>').join('')}</ul>
    </div>
    <div class="col">
      <h4>💰 省钱技巧</h4>
      <ul>${city.save.map(p => '<li>'+ p +'</li>').join('')}</ul>
    </div>
  `;
  document.getElementById('rGuide').innerHTML = guideHtml;

  var costHtml = "";
  var totalMin = 0, totalMax = 0;
  city.costs.forEach(function(item) {
    var parts = item.a.split("-").map(Number);
    var minP = parts[0] || 0;
    var maxP = parts[1] ?? minP;
    var showMin = Math.round(minP * dayRate);
    var showMax = Math.round(maxP * dayRate);
    totalMin += showMin;
    totalMax += showMax;
    costHtml += `<div class="cost-item"><span>${item.i}（单人${dayNum}天）</span><span>¥${showMin} - ¥${showMax}</span></div>`;
  });
  costHtml += `<div class="cost-total"><span>人均总计（${dayNum}天）</span><span class="p">¥${totalMin} - ¥${totalMax}</span></div>`;
  costHtml += `<div class="cost-total" style="font-size:13px;color:#64748b"><span>${peopleLabel}总预算估算（${dayNum}天）</span><span>¥${Math.round(totalMin*pNum)} - ¥${Math.round(totalMax*pNum)}</span></div>`;
  document.getElementById('rCost').innerHTML = costHtml;
}

// ===== 主流程（防连点锁） =====
function startGame() {
  if (isRunning) return;
  isRunning = true;

  document.getElementById('inputSec').style.display = 'none';
  document.getElementById('resultSec').classList.remove('show');
  document.getElementById('animSec').style.display = 'flex';

  var box = document.getElementById('box');
  var text = document.getElementById('animText');
  var texts = ["正在匹配你的出行偏好…", "正在筛选30座目的地…", "正在生成专属行程…", "马上揭晓…"];
  var idx = 0;

  var shakeTimer = setInterval(function() {
    box.classList.toggle('shake');
  }, 250);

  var textTimer = setInterval(function() {
    idx++;
    if (idx < texts.length) text.innerText = texts[idx];
  }, 600);

  setTimeout(function() {
    clearInterval(shakeTimer);
    clearInterval(textTimer);
    box.classList.remove('shake');

    var data = randomPick();
    renderData(data);

    document.getElementById('animSec').style.display = 'none';
    document.getElementById('resultSec').classList.add('show');
    isRunning = false;
  }, 2200);
}

// ===== 重开 =====
function retry() {
  isRunning = false;
  document.getElementById('inputSec').style.display = 'block';
  document.getElementById('animSec').style.display = 'none';
  document.getElementById('resultSec').classList.remove('show');
}

// ===== 保存方案（localStorage版，最多存10条） =====
function savePlan() {
  var el = document.getElementById('rName');
  if (!el) return;
  var plan = { 
    name: el.innerText, 
    slogan: document.getElementById('rSlogan').innerText, 
    time: new Date().toLocaleString() 
  };
  var list = JSON.parse(localStorage.getItem('travelPlans') || '[]');
  list.unshift(plan);
  localStorage.setItem('travelPlans', JSON.stringify(list.slice(0,10)));
  alert("方案「"+ plan.name +"」已保存\n刷新不丢失，清缓存会失效");
}

</script>
